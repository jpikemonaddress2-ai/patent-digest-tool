# 特許情報ダイジェスト 設定ファイル
# このファイルを編集するだけでツールの挙動を変更できます

# ---- 関心キーワード ----
# タイトル・概要にこれらのキーワードが含まれる特許だけを収集します
# 英語で記載してください（EPO OPS は英語検索対応）
interest_keywords:
  - polymer
  - antistatic
  - conductive polymer
  - organic synthesis
  - catalyst
  - nanocomposite
  - polyurethane
  - polymer synthesis
  - polymer composite
  - electroconductive

# ---- 収集・フィルタ設定 ----
delivery:
  days_back: 7          # 何日分の特許を対象にするか（1週間）
  min_score: 3          # デフォルトの最低スコア（下記で上書き）
  min_score_jp: 3       # 日本特許（JP）の最低スコア
  min_score_world: 4    # 日本以外（WO・US等）の最低スコア
  max_patents: 50       # EPO OPS から取得する最大件数（上限100）
  search_fields: "ti,cl"  # 検索対象: ti=タイトル / cl=請求項 / ab=概要（カンマ区切りで複数可）
  country_filter: ""    # 国フィルタ: "JP"=日本のみ / ""=全世界（WO・US混在）

# ---- AI要約設定 ----
# GEMINI_API_KEY 環境変数が設定されている場合のみ日本語要約が生成されます
# 未設定時はタイトルがそのまま掲載されます
gemini_model: "gemini-2.5-flash"

# ---- EPO OPS 認証設定 ----
# https://developers.epo.org/ でアプリを登録して取得
epo:
  key_env: EPO_CONSUMER_KEY      # Consumer Key の環境変数名
  secret_env: EPO_CONSUMER_SECRET  # Consumer Secret の環境変数名

# ---- メール設定 ----
# 実際のアドレスは GitHub Secrets に登録し、環境変数名だけここに書く
email:
  from_env: GMAIL_ADDRESS            # 送信元Gmailアドレスの環境変数名
  password_env: GMAIL_APP_PASSWORD   # Gmailアプリパスワードの環境変数名
  to_env: TO_ADDRESSES               # 宛先メールアドレスの環境変数名（カンマ区切りで複数可）
  subject_prefix: "🔬 特許情報ダイジェスト"
